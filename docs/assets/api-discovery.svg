<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ad" markerWidth="12" markerHeight="12" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#475569"/></marker>
  </defs>
  <rect x="1" y="1" width="998" height="398" rx="20" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>

  <text x="500" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#f1f5f9">From one click-through to <tspan fill="#34d399">backend integration evidence</tspan></text>
  <text x="500" y="74" text-anchor="middle" font-size="14" fill="#94a3b8">API Discovery — the workflow that separates it from a plain scraper or click-recorder</text>

  <!-- step 1 -->
  <rect x="28" y="104" width="224" height="176" rx="14" fill="#1a1330" stroke="#4c3a7a" stroke-width="1.5"/>
  <circle cx="58" cy="138" r="16" fill="#a78bfa"/><text x="58" y="144" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1330">1</text>
  <text x="88" y="144" font-size="17" font-weight="700" fill="#c4b5fd">Run it once</text>
  <text x="48" y="182" font-size="13.5" fill="#cbd5e1">You drive manually:</text>
  <text x="48" y="204" font-size="13.5" fill="#94a3b8">log in · click · paginate</text>
  <text x="48" y="240" font-size="12.5" fill="#8b8ca8">Human stays in the loop —</text>
  <text x="48" y="258" font-size="12.5" fill="#8b8ca8">judgement &amp; auth are yours</text>

  <!-- step 2 -->
  <rect x="268" y="104" width="224" height="176" rx="14" fill="#0d2430" stroke="#1f5566" stroke-width="1.5"/>
  <circle cx="298" cy="138" r="16" fill="#22d3ee"/><text x="298" y="144" text-anchor="middle" font-size="16" font-weight="700" fill="#0d2430">2</text>
  <text x="328" y="144" font-size="17" font-weight="700" fill="#67e8f9">Record</text>
  <text x="288" y="182" font-size="13.5" fill="#cbd5e1">Capture the whole run:</text>
  <text x="288" y="206" font-size="12.5" fill="#94a3b8">· trace of every action</text>
  <text x="288" y="226" font-size="12.5" fill="#94a3b8">· network requests</text>
  <text x="288" y="246" font-size="12.5" fill="#94a3b8">· page text · screenshots</text>

  <!-- step 3 -->
  <rect x="508" y="104" width="224" height="176" rx="14" fill="#2b2410" stroke="#6b551f" stroke-width="1.5"/>
  <circle cx="538" cy="138" r="16" fill="#fbbf24"/><text x="538" y="144" text-anchor="middle" font-size="16" font-weight="700" fill="#2b2410">3</text>
  <text x="568" y="144" font-size="17" font-weight="700" fill="#fcd34d">Review</text>
  <text x="528" y="182" font-size="13.5" fill="#cbd5e1">Surface what matters:</text>
  <text x="528" y="206" font-size="12.5" fill="#94a3b8">· API candidates + params</text>
  <text x="528" y="226" font-size="12.5" fill="#94a3b8">· stable selectors</text>
  <text x="528" y="246" font-size="12.5" fill="#94a3b8">· keep-UI vs go-API</text>

  <!-- step 4 -->
  <rect x="748" y="104" width="224" height="176" rx="14" fill="#0e2a1e" stroke="#1f6647" stroke-width="1.5"/>
  <circle cx="778" cy="138" r="16" fill="#34d399"/><text x="778" y="144" text-anchor="middle" font-size="16" font-weight="700" fill="#0e2a1e">4</text>
  <text x="808" y="144" font-size="17" font-weight="700" fill="#6ee7b7">Ship</text>
  <text x="768" y="182" font-size="13.5" fill="#cbd5e1">Second-dev it into:</text>
  <text x="768" y="206" font-size="12.5" fill="#94a3b8">· backend adapter · CLI</text>
  <text x="768" y="226" font-size="12.5" fill="#94a3b8">· extractor · site profile</text>
  <text x="768" y="246" font-size="12.5" fill="#94a3b8">· automation pipeline</text>

  <line x1="252" y1="192" x2="266" y2="192" stroke="#475569" stroke-width="2.4" marker-end="url(#ad)"/>
  <line x1="492" y1="192" x2="506" y2="192" stroke="#475569" stroke-width="2.4" marker-end="url(#ad)"/>
  <line x1="732" y1="192" x2="746" y2="192" stroke="#475569" stroke-width="2.4" marker-end="url(#ad)"/>

  <text x="500" y="322" text-anchor="middle" font-size="14.5" fill="#cbd5e1">Recording isn't about replaying clicks — it's about <tspan fill="#f1f5f9" font-weight="700">reverse-engineering the backend API behind them.</tspan></text>
  <text x="500" y="348" text-anchor="middle" font-size="13" fill="#8b8ca8">Most "frontend clicks" are really a backend request in disguise. Surface it, and a click becomes a programmable call.</text>
</svg>
