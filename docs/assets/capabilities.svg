<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 452" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="998" height="450" rx="20" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <text x="500" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#f1f5f9">Capabilities at a glance</text>

  <!-- Engine card -->
  <rect x="28" y="70" width="464" height="352" rx="14" fill="#131c2e" stroke="#1f4a55" stroke-width="1.5"/>
  <rect x="28" y="70" width="6" height="352" rx="3" fill="#22d3ee"/>
  <text x="54" y="104" font-size="18" font-weight="700" fill="#67e8f9">Browser Engine <tspan font-size="13" font-weight="400" fill="#8b8ca8">· execution layer</tspan></text>

  <g font-size="11" letter-spacing="1.5" font-weight="700">
    <text x="54" y="140" fill="#3fb6c9">CONNECT</text>
    <text x="54" y="192" fill="#3fb6c9">INTERACT</text>
    <text x="54" y="244" fill="#3fb6c9">READ</text>
    <text x="54" y="296" fill="#3fb6c9">OBSERVE</text>
    <text x="54" y="348" fill="#3fb6c9">ADVANCED</text>
  </g>
  <g font-size="13" fill="#a9b6c8">
    <text x="54" y="162">CDP auto-discovery · tab lifecycle · groups</text>
    <text x="54" y="214">click · type · scroll · drag · upload · hotkeys · clipboard</text>
    <text x="54" y="266">text · links · forms · tables · DOM · a11y · shot · PDF</text>
    <text x="54" y="318">network · response bodies · cookies · storage · downloads</text>
    <text x="54" y="370">iframes · shadow DOM · dialogs · smart waits · batch · pipeline</text>
  </g>

  <!-- Intelligence card -->
  <rect x="508" y="70" width="464" height="352" rx="14" fill="#131c2e" stroke="#3b2f5e" stroke-width="1.5"/>
  <rect x="508" y="70" width="6" height="352" rx="3" fill="#a78bfa"/>
  <text x="534" y="104" font-size="18" font-weight="700" fill="#c4b5fd">Browser Intelligence <tspan font-size="13" font-weight="400" fill="#8b8ca8">· analysis layer</tspan></text>

  <g font-size="11" letter-spacing="1.5" font-weight="700">
    <text x="534" y="140" fill="#9a7fe0">RECORD</text>
    <text x="534" y="192" fill="#9a7fe0">REVIEW</text>
    <text x="534" y="244" fill="#9a7fe0">EXTRACT</text>
    <text x="534" y="296" fill="#9a7fe0">DISCOVER</text>
    <text x="534" y="348" fill="#9a7fe0">ASSETS</text>
  </g>
  <g font-size="13" fill="#a9b6c8">
    <text x="534" y="162">trace · network · page text · screenshots · marks</text>
    <text x="534" y="214">API candidates · stable selectors · nav paths · strategy</text>
    <text x="534" y="266">structured content (Xiaohongshu + generic parser)</text>
    <text x="534" y="318">URL / method · params · auth headers · response schema</text>
    <text x="534" y="370">per-task isolation · task persistence · site profiles</text>
  </g>
</svg>
